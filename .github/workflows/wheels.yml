name: Build wheels

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  wheels:
    name: Build release and debug-log wheels
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm libhdf5-dev

      - name: Install Python build frontend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build release wheel
        run: |
          python -m build --wheel --outdir wheelhouse/release

      - name: Build debug-log wheel
        run: |
          python -m build --wheel --outdir wheelhouse/debug \
            --config-setting=setup-args=-Dbuildtype=debugoptimized \
            --config-setting=setup-args=-Dcimba_debug_logs=true

      - name: Upload release wheel
        uses: actions/upload-artifact@v7
        with:
          name: cimba-release-wheel
          path: wheelhouse/release/*.whl
          if-no-files-found: error

      - name: Upload debug-log wheel
        uses: actions/upload-artifact@v7
        with:
          name: cimba-debug-log-wheel
          path: wheelhouse/debug/*.whl
          if-no-files-found: error
